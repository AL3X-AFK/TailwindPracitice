<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/output.css">
    <title>Página Naciones RP</title>
</head>

<body class="max-w-xl mx-auto
    min-h-dvh
    bg-gradient-to-b from-[#b96ed6] via-[#b96ed6] to-[#c4fecd]
">
    <header class="text-white">
        <img src="./assets/logo.png" alt="Logo de Naciones RP"        
        class="h-106 object-cover mx-auto 
        mask-b-from-60% mask-b-to-95%
        mask-l-from-97% mask-l-to-100%
        mask-r-from-97% mask-r-to-100%
        animate-pulse-fade-in" 
        >

         

        <header class="flex flex-col items-center justify-center mb-5">
            <span class="
                text-sky-200 font-mono px-3 py-1
                border rounded-full flex items-center 
                justify-center shadow-md bg-black/65
                cursor-crosshair -mt-6 z-10
            ">
                @NacionesRP
                 <svg class="ml-1 w-5 h-5 text-sky-200 inline" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fill-rule="evenodd"
                    d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-8.707a1 1 0 00-1.414-1.414L9 11.172l-1.293-1.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                    clip-rule="evenodd" />
                </svg>
            </span>

            <h1 class="text-3xl font-bold leading-tight mt-1">
                Alex Valdez
            </h1>
        </header>

        <section class="flex gap-2 justify-center">
            <a class="bg-gray-900 social-button" href="https://github.com" target="_blank" aria-label="GitHub" title="Ir a GitHub">
                <svg width="28" height="28">
                    <use xlink:href ="./assets/sprite.svg#github" />
                </svg>
            </a>

            <a class="bg-purple-100 social-button" href="https://twitch.tv/kirutoby__" target="_blank" aria-label="Twitch" title="Ir al Twitch de Kirutoby">
                <svg width="28" height="28">
                    <use xlink:href ="./assets/sprite.svg#twitch" />
                </svg>
            </a>

            <a class="bg-white social-button" href="https://www.youtube.com/" target="_blank" aria-label="YouTube" title="Ir al canal de YouTube">
                <svg width="28" height="28">
                    <use xlink:href ="./assets/sprite.svg#youtube" />
                </svg>
            </a>

            <a class=" social-button bg-gradient-to-tr from-yellow-400 via-pink-600 to-purple-900" href="https://instagram.com" target="_blank" aria-label="Instagram" title="Ir al Instagram">
                <svg width="28" height="28">
                    <use xlink:href ="./assets/sprite.svg#instagram" />
                </svg>
            </a>

            <a class="bg-blue-50 social-button" href="https://discord.com" target="_blank" aria-label="Discord" title="Ir a Discord">
                <svg width="28" height="28">
                    <use xlink:href ="./assets/sprite.svg#discord" />
                </svg>
            </a>

            <a class="bg-white social-button" href="https://linkedin.com" target="_blank" aria-label="LinkedIn" title="Ir a LinkedIn">
                <svg width="28" height="28">
                    <use xlink:href ="./assets/sprite.svg#linkedin" />
                </svg>
            </a>
        </section>

        <p class ="text-center mt-4 text-sm text-green-950 px-4 font-semibold text-balance">
            Ya sea que quieras ascender en la legalidad o dominar las calles, 
            aquí tú escribes tu propia historia. ¡Tu nueva vida en Los Santos empieza ahora!
        </p>
    </header>

    <main class="pt-4">
        <div clas="grid grid-cols-3 grid-rows-2 gap-2 w-full"> 
            <a href="https://www.youtube.com" class="
                relative rounded-3xl overflow-hidden bg-gradient-to-t from-gray-900 to-gray-700 text-white 
                border border-cyan-900
                flex flex-col items-start
                hover:scale-105 hover:contrast-125
                transition
                col-span-2
            ">
                <span class="absolute bottom-2 left-2 font-bold text-2xl">LSPD</span>

                <img src="assets/lspd.jpg" alt="" width="100%">

                <span class="absolute top-2 left-2 font-medium text-sm 
                bg-black/60 px-2 py-1 rounded-xl">
                    Conviértete en un agente de la ley
                </span>
            </a>

        </div>
    </main>
   
</body>
</html>
